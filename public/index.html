<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarkariResNova | Latest Govt Jobs, Results & Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-800 p-4 text-white text-center text-2xl font-bold">SARKARI RES NOVA</nav>
    
    <div class="container mx-auto p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-orange-500 p-4 rounded text-white text-center font-bold shadow">🧮 Age Calculator</div>
            <div class="bg-green-600 p-4 rounded text-white text-center font-bold shadow">📝 Resume / CV Maker</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-4 border-t-4 border-blue-600 shadow">
                <h2 class="font-bold text-xl mb-4 border-b">Latest Jobs</h2>
                <ul id="jobs-list" class="text-blue-700 space-y-2"></ul>
            </div>
            <div class="bg-white p-4 border-t-4 border-red-600 shadow">
                <h2 class="font-bold text-xl mb-4 border-b">Admit Card</h2>
                <ul id="admit-list" class="text-blue-700 space-y-2"></ul>
            </div>
            <div class="bg-white p-4 border-t-4 border-green-600 shadow">
                <h2 class="font-bold text-xl mb-4 border-b">Results</h2>
                <ul id="result-list" class="text-blue-700 space-y-2"></ul>
            </div>
        </div>
    </div>
</body>
</html>
