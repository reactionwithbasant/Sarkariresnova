<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SarkariResNova.com - Latest Govt Jobs, Admit Card, Result</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    .cat-box { border: 1px solid #ccc; min-height: 400px; background: white; border-radius: 5px; overflow: hidden; }
    .cat-header { color: white; padding: 12px; font-weight: bold; text-align: center; font-size: 18px; border-bottom: 2px solid #ff00ff; }
    .link-list { list-style: none; padding: 0; margin: 0; }
    .link-list li { border-bottom: 1px solid #eee; padding: 10px; font-size: 14px; }
    .link-list li a { color: #0000ff; text-decoration: none; font-weight: 500; }
    .link-list li a:hover { text-decoration: underline; color: red; }
</style></head>
<body class="bg-gray-100 font-sans">
    <header class="bg-[#1e3a8a] text-white p-6 text-center border-b-4 border-yellow-400 shadow-lg">
        <h1 class="text-3xl font-bold italic">SarkariResNova.com</h1>
        <p class="text-xs uppercase mt-2 tracking-widest">Powered by RAGHVITA ENTERPRISES</p>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="cat-box shadow-md">
                <div class="cat-header bg-green-700">Result</div>
                <ul id="result-list" class="link-list">
                    </ul>
            </div>
            <div class="cat-box shadow-md">
                <div class="cat-header bg-red-700">Admit Card</div>
                <ul id="admit-list" class="link-list">
                    </ul>
            </div>
            <div class="cat-box shadow-md">
                <div class="cat-header bg-blue-700">Latest Job</div>
                <ul id="job-list" class="link-list">
                    </ul>
            </div>
        </div>

        <div style="display:none;"><ul></ul></div>
    </main>

    <footer class="mt-12 p-10 bg-gray-900 text-white text-center">
        <p class="text-sm font-bold">© 2026 RAGHVITA ENTERPRISES</p>
        <p class="text-[10px] text-gray-500 mt-2 italic">Honesty, Values, and Hard Work</p>
    </footer>
</body></html>
