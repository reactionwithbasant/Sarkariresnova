<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *;">
  <title>Ad2Win | RAGHVITA ENTERPRISES</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { background: #0f172a; color: white; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 85%; }
    .btn { background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; }
    #dashboard { display: none; }
  </style>
</head>
<body>

  <div id="loginSection" class="glass-card">
    <h1 style="font-size: 40px;">🪙</h1>
    <h2>Ad2Win</h2>
    <p style="color: #94a3b8;">Powered by RAGHVITA ENTERPRISES</p>
    <button class="btn" id="btnGoogleLogin">Login with Google</button>
  </div>

  <div id="dashboard" class="glass-card">
    <h2>Welcome, <span id="userName">User</span>!</h2>
    <div style="margin-top: 20px; font-size: 24px;">Coins: <span id="txtCoins" style="color: #fbbf24;">0</span></div>
    <button class="btn" onclick="location.reload()">Refresh</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC5RgzMeAlQrbKbtcRvY7YgNKK59w2mT8s",
      authDomain: "raghvitamart.firebaseapp.com",
      projectId: "raghvitamart",
      storageBucket: "raghvitamart.firebasestorage.app",
      messagingSenderId: "849119353425",
      appId: "1:849119353425:web:cc2114ea115235cc43f670"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Direct Click Handling
    document.getElementById('btnGoogleLogin').onclick = async () => {
        alert("Redirecting to Google... Please wait.");
        try {
            await signInWithRedirect(auth, provider);
        } catch (error) {
            alert("Error: " + error.message);
        }
    };

    // Auth Change Detection
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userName').innerText = user.displayName;
      } else {
        getRedirectResult(auth).catch((e) => {
            if(e.code !== "auth/operation-not-supported-in-this-environment") {
                alert("Login Failed: " + e.message);
            }
        });
      }
    });
  </script>
</body>
</html>
