<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; connect-src * 'unsafe-inline' https://*.firebaseio.com https://*.googleapis.com https://identitytoolkit.googleapis.com; img-src * data: blob: 'unsafe-inline'; frame-src *;">
  <title>Ad2Win | Powered by RAGHVITA ENTERPRISES</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #0f172a; color: #f8fafc; min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 24px; font-weight: 800; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 20px; margin: 15px 20px; border-radius: 20px; text-align: center; }
    .btn { background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; border: none; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 600; width: 100%; margin-top: 10px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
    .game-item { background: rgba(30,41,59,0.8); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
    .section { display: none; }
    .active-section { display: block; }
    .coin-val { font-size: 32px; font-weight: 800; color: #fbbf24; }
    .rupee-val { font-size: 32px; font-weight: 800; color: #4ade80; }
  </style>
</head>
<body>

  <div class="navbar"><div class="logo">Ad2Win</div><div>👤 <span id="userName">User</span></div></div>

  <div id="loginSection" class="section active-section">
    <div class="glass-card" style="margin-top: 50px;">
      <h1>🪙</h1><h2>Ad2Win Login</h2>
      <button class="btn" id="btnGoogleLogin" style="background:white; color:black;">Login with Google</button>
    </div>
  </div>

  <div id="dashboardSection" class="section">
    <div class="glass-card">
      <div style="display:flex; justify-content:space-around;">
        <div><small>Coins</small><div class="coin-val" id="txtCoins">0</div></div>
        <div><small>Balance</small><div class="rupee-val">₹<span id="txtRupees">0.00</span></div></div>
      </div>
      <button class="btn" id="btnGoWithdraw">Withdraw</button>
    </div>
    <h3 style="padding: 10px 20px;">10 Premium Games</h3>
    <div class="grid" id="gamesGrid"></div>
  </div>

  <div id="gamePlaySection" class="section">
    <div class="glass-card" style="margin-top: 40px;">
      <h2 id="gameTitle">Game</h2>
      <div id="gameBoard" style="margin: 20px 0; font-size: 50px;">🎮</div>
      <h3 id="gameResultText"></h3>
      <button class="btn" id="btnStartGame">▶ Play Now</button>
      <button class="btn" id="btnClaimReward" style="display:none; background:gold; color:black;">📺 Watch Ad to Claim</button>
      <button class="btn" onclick="location.reload()" style="margin-top:10px; background:gray;">Back</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithCredential, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC5RgzMeAlQrbKbtcRvY7YgNKK59w2mT8s",
      authDomain: "raghvitamart.firebaseapp.com",
      projectId: "raghvitamart",
      appId: "1:849119353425:web:cc2114ea115235cc43f670"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let AdMob = null;
    let pendingCoins = 0;

    // --- ADS LOGIC (Banner, Interstitial, Rewarded) ---
    async function initAds() {
        if(window.Capacitor && window.Capacitor.Plugins.AdMob) {
            AdMob = window.Capacitor.Plugins.AdMob;
            await AdMob.initialize();
            
            // 1. BANNER AD (Hamesha dikhta rahega)
            await AdMob.showBanner({
                adId: 'ca-app-pub-3940256099942544/6300978111',
                position: 'BOTTOM_CENTER',
                margin: 60,
                isTesting: true
            });
        }
    }

    async function showInterstitial() {
        if(AdMob) {
            // 2. INTERSTITIAL AD (Game result ke baad)
            await AdMob.prepareInterstitial({ adId: 'ca-app-pub-3940256099942544/1033173712', isTesting: true });
            await AdMob.showInterstitial();
        }
    }

    async function showRewarded() {
        if(AdMob) {
            // 3. REWARDED AD (Coins claim karne ke liye)
            await AdMob.prepareRewardVideoAd({ adId: 'ca-app-pub-3940256099942544/5224354917', isTesting: true });
            await AdMob.showRewardVideoAd();
            
            AdMob.addListener('onRewardedVideoAdRewarded', (info) => {
                addCoinsToWallet(pendingCoins);
                alert("Success! " + pendingCoins + " Coins added.");
                location.reload();
            });
        } else {
            // Testing on PC/Browser
            addCoinsToWallet(pendingCoins);
            location.reload();
        }
    }

    // --- GAME & WALLET LOGIC ---
    const GAMES = [
        {id: 'slot', name: 'Slots', icon: '🎰'}, {id: 'coin', name: 'Coin Flip', icon: '🪙'},
        {id: 'spin', name: 'Spin Wheel', icon: '🎡'}, {id: 'dice', name: 'Lucky Dice', icon: '🎲'},
        {id: 'box', name: 'Mystery Box', icon: '🎁'}, {id: 'scratch', name: 'Scratch', icon: '🎫'},
        {id: 'math', name: 'Math Quiz', icon: '🧮'}, {id: 'color', name: 'Color Guess', icon: '🎨'},
        {id: 'rps', name: 'Rock Paper', icon: '✌️'}, {id: 'draw', name: 'Card Draw', icon: '🃏'}
    ];

    function renderGames() {
        const grid = document.getElementById('gamesGrid');
        GAMES.forEach(g => {
            grid.innerHTML += `<div class="game-item" onclick="window.playGame('${g.name}')"><div>${g.icon}</div><div style="font-size:12px;">${g.name}</div></div>`;
        });
    }

    window.playGame = (name) => {
        document.getElementById('gameTitle').innerText = name;
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('gamePlaySection').style.display = 'block';
    };

    document.getElementById('btnStartGame').onclick = () => {
        document.getElementById('btnStartGame').style.display = 'none';
        document.getElementById('gameResultText').innerText = "Playing...";
        
        setTimeout(async () => {
            pendingCoins = Math.floor(Math.random() * 50) + 10;
            document.getElementById('gameResultText').innerText = "You Won " + pendingCoins + " Coins!";
            document.getElementById('btnClaimReward').style.display = 'block';
            
            // Trigger Interstitial Ad here
            await showInterstitial();
        }, 2000);
    };

    document.getElementById('btnClaimReward').onclick = () => {
        showRewarded();
    };

    async function addCoinsToWallet(amount) {
        // Firebase update logic yahan aayega
    }

    // --- LOGIN LOGIC ---
    document.getElementById('btnGoogleLogin').onclick = async () => {
        const { GoogleAuth } = window.Capacitor.Plugins;
        const googleUser = await GoogleAuth.signIn();
        const credential = GoogleAuthProvider.credential(googleUser.authentication.idToken);
        await signInWithCredential(auth, credential);
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('userName').innerText = user.displayName.split(" ")[0];
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        renderGames();
        initAds();
      }
    });
  </script>
</body>
</html>
