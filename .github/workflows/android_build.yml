name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Tools
        run: npm install -g @capacitor/cli

      - name: Setup Project
        run: |
          npm install @capacitor/core @capacitor/android --force
          mkdir -p www
          # Sirf index.html copy karein (main.js ki zarurat nahi hai)
          cp index.html www/
          
          # Force a clean capacitor config
          echo '{"appId":"com.raghvita.ad2win","appName":"Ad2Win","webDir":"www"}' > capacitor.config.json
          
          rm -rf android
          cap add android
          
          # Mandatory fixes for modern Gradle
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.20"/' android/build.gradle
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          
          # Google Services update
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
          fi
          
          cap sync android

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk

