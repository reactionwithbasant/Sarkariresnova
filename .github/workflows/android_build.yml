name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Capacitor
        run: npm install -g @capacitor/cli

      - name: Setup Project
        run: |
          npm install @capacitor/core @capacitor/android --force
          
          # YAHAN ASLI FIX HAI: Native Google Login Plugin
          npm install @codetrix-studio/capacitor-google-auth
          
          mkdir -p www
          cp index.html www/
          
          # Capacitor Config with Google Auth Plugin
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.raghvita.ad2win",
            "appName": "Ad2Win",
            "webDir": "www",
            "plugins": {
              "GoogleAuth": {
                "scopes": ["profile", "email"],
                "serverClientId": "849119353425-da1h69vsf869t9ltf6umifkfqtuvfjae.apps.googleusercontent.com",
                "forceCodeForRefreshToken": true
              }
            }
          }
          EOF
          
          rm -rf android
          cap add android
          
          # Android Strings required for Native Google Login
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="server_client_id">849119353425-da1h69vsf869t9ltf6umifkfqtuvfjae.apps.googleusercontent.com</string></resources>' > android/app/src/main/res/values/custom_strings.xml
          
          # Kotlin Version Clash Fix
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22', 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22', 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } }" >> android/app/build.gradle
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          
          cap sync android

      - name: Build Final APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-NativeLogin-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

