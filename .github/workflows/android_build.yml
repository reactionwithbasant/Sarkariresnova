name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Tools
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android --force

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp main.js www/
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.raghvita.ad2win","appName": "Ad2Win","webDir": "www"}' > capacitor.config.json
          fi

      - name: Add Android & Fix Kotlin
        run: |
          if [ ! -d "android" ]; then
            cap add android
          fi
          # Kotlin version fix for Gradle 8+
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.20"/' android/build.gradle
          cap sync android

      - name: Build with Gradle
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

