name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Tools & Dependencies
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android --force

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp main.js www/
          # Create a dummy capacitor config if missing
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId": "com.raghvita.ad2win","appName": "Ad2Win","webDir": "www","bundledWebRuntime": false}' > capacitor.config.json
          fi

      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            cap add android
          fi
          cap sync android

      - name: Build with Gradle
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

