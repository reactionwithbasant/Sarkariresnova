name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Tools
        run: npm install -g @capacitor/cli

      - name: Setup Project
        run: |
          npm install @capacitor/core @capacitor/android --force
          mkdir -p www
          cp index.html www/
          cp main.js www/
          echo '{"appId":"com.raghvita.ad2win","appName":"Ad2Win","webDir":"www"}' > capacitor.config.json
          
          rm -rf android
          cap add android
          
          # CRITICAL FIX: Force Kotlin version in project build.gradle
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.22"/' android/build.gradle
          
          # CRITICAL FIX: Force resolution of stdlib mismatch in app build.gradle
          echo "configurations.all { resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22' }" >> android/app/build.gradle
          
          cap sync android

      - name: Build Final APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

