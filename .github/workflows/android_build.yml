name: Build Android APK and AAB
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: fixed-debug-keystore-v1

      - name: Generate Fixed Keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=IN, O=Raghvita, CN=Ad2Win"
          fi

      - name: Install Capacitor & Assets Tool
        run: npm install -g @capacitor/cli @capacitor/assets

      - name: Setup Project & Plugins
        run: |
          # @capacitor/app plugin added for Back Button functionality
          npm install @capacitor/core @capacitor/android @capacitor/app @codetrix-studio/capacitor-google-auth @capacitor-community/admob --force
          mkdir -p www
          cp index.html www/
          
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.raghvita.ad2win",
            "appName": "Ad2Win",
            "webDir": "www",
            "plugins": {
              "GoogleAuth": {
                "scopes": ["profile", "email"],
                "serverClientId": "849119353425-da1h69vsf869t9ltf6umifkfqtuvfjae.apps.googleusercontent.com",
                "forceCodeForRefreshToken": true
              }
            }
          }
          EOF
          
          rm -rf android
          cap add android
          
          # 1. APP LOGO GENERATION
          mkdir -p assets
          wget -O assets/icon.png "https://ui-avatars.com/api/?name=A+W&background=0ea5e9&color=fff&size=512&bold=true"
          wget -O assets/splash.png "https://ui-avatars.com/api/?name=Ad2Win&background=0f172a&color=0ea5e9&size=2048&bold=true"
          npx @capacitor/assets generate --android
          
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
          fi
          
          sed -i '/dependencies {/a \        classpath "com.google.gms:google-services:4.4.1"' android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="server_client_id">849119353425-da1h69vsf869t9ltf6umifkfqtuvfjae.apps.googleusercontent.com</string><string name="admob_app_id">ca-app-pub-3940256099942544~3347511713</string></resources>' > android/app/src/main/res/values/custom_strings.xml
          sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="@string/admob_app_id"/></application>|' android/app/src/main/AndroidManifest.xml
          
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22', 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22', 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } }" >> android/app/build.gradle
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          
          cap sync android

      - name: Build APK and AAB (Signed Release)
        run: |
          chmod +x android/gradlew
          cd android
          # Ye command ek hi baar mein APK aur AAB dono banayegi aur sign karegi
          ./gradlew assembleRelease bundleRelease -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android --no-daemon

      - name: Upload Final APK (For Phone Install)
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-Final-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Final AAB (For Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-PlayStore-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab

