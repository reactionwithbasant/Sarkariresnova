name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Setup Project & Sync
        run: |
          npm install @capacitor/core @capacitor/android --force
          mkdir -p www
          cp index.html www/
          cp main.js www/
          # Create fresh config
          echo '{"appId":"com.raghvita.ad2win","appName":"Ad2Win","webDir":"www"}' > capacitor.config.json
          
          # Delete old android folder to avoid cache conflicts
          rm -rf android
          cap add android
          
          # Force Kotlin and Gradle compatibility
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.20"/' android/build.gradle
          # Fix for Namespace error in new Gradle
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          
          cap sync android

      - name: Build Final APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

