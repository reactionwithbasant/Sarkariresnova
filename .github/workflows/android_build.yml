name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Capacitor
        run: npm install -g @capacitor/cli

      - name: Setup Project
        run: |
          npm install @capacitor/core @capacitor/android --force
          
          # MASTER FIX: Installing In-App Browser plugin so popups work perfectly inside the app
          npm install cordova-plugin-inappbrowser
          
          mkdir -p www
          cp index.html www/
          
          # Standard Config (Removed the hostname spoofing that caused the partition error)
          echo '{"appId":"com.raghvita.ad2win","appName":"Ad2Win","webDir":"www"}' > capacitor.config.json
          
          rm -rf android
          cap add android
          
          # Kotlin resolution strategy to prevent build clash
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22', 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22', 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } }" >> android/app/build.gradle
          
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          
          cap sync android

      - name: Build Final APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-Perfect-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

