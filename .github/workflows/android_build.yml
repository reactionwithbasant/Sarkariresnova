name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Capacitor
        run: npm install -g @capacitor/cli

      - name: Setup Web Dir & Sync
        run: |
          npm install @capacitor/core @capacitor/android --force
          mkdir -p www
          # Sirf index.html ko copy karein
          cp index.html www/
          
          # Fresh config for Ad2Win
          echo '{"appId":"com.raghvita.ad2win","appName":"Ad2Win","webDir":"www"}' > capacitor.config.json
          
          rm -rf android
          cap add android
          
          # Kotlin and Gradle Fixes
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.22"/' android/build.gradle
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          
          # Copy google-services if exists
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
          fi
          
          cap sync android

      - name: Build Final APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ad2Win-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

