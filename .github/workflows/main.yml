name: SarkariResNova Final Engine
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Libraries
        run: npm install axios
      - name: Run AI Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: node scripts/generator.js
      - name: Save Changes
        run: |
          git config --global user.name "Sarkari Bot"
          git config --global user.email "bot@sarkariresnova.com"
          git add index.html
          git commit -m "Auto-update: AdSense Content" || echo "No changes"
          git push
