name: SarkariResNova Auto Engine
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install axios rss-parser
      - name: Run Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: node scripts/generator.js
      - name: Save Data
        run: |
          git config --global user.name "Sarkari Bot"
          git config --global user.email "bot@sarkariresnova.com"
          git add .
          git commit -m "Auto Update Jobs" || echo "No changes"
          git push
